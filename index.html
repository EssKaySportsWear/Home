<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EssKay Sportswear</title>
  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="navbar-complete.js"></script>
  <script src="navbar-script.js"></script>
  <script type="module" src="auth.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #0a1018;
      --surface: rgba(255, 255, 255, 0.08);
      --surface-strong: rgba(8, 13, 21, 0.74);
      --surface-muted: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.12);
      --border-strong: rgba(123, 231, 255, 0.18);
      --text: #f8fbff;
      --muted: #aab4c2;
--muted-strong: #D2C4B4;
      --accent: #7be7ff;
      --accent-strong: #96fff0;
      --shadow: 0 25px 80px rgba(0, 0, 0, 0.45);
      --radius-lg: 32px;
      --content-width: min(1240px, calc(100% - 32px));
      --ease: 220ms ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Sora", sans-serif;
      color: var(--text);
      background: #F3E3D0;
      min-height: 100vh;
    }

    /* Desktop styles */
    .site-nav {
      position: relative;
      top: 18px;
      z-index: 30;
      width: var(--content-width);
      margin: 18px auto 0;
      padding: 14px 18px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(25px);
      position: sticky;
    }

    @media (min-width: 769px) {
      #mobile-menu-btn {
        display: none;
      }

      .nav-links {
        translate: none !important;
      }
    }

    #indicator {
      position: absolute;
      top: 5px;
      left: 0;
      height: calc(100% - 10px);
      border-radius: 999px;
      background: #AACDDC;
      z-index: 1;
      transition: all 0.3s cubic-bezier(0.25,1,0.5,1);
      width: 0;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-link {
      position: relative;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      transition: transform var(--ease), border-color var(--ease), background var(--ease), box-shadow var(--ease), color var(--ease);
      border: 1px solid transparent;
      color: #000000;
      text-decoration: none;
    }

    .nav-link.active {
      background: #AACDDC;
      color: white;
      border-radius: 999px;
    }

    .nav-link:hover {
      transform: translateY(-2px);
      border-color: var(--border-strong);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 18px 38px rgba(5, 15, 25, 0.45);
    }

    button.nav-link {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: inherit;
      padding: 0 18px;
    }

    /* Mobile styles */
    @media (max-width: 768px) {
      .site-nav {
        justify-content: flex-start;
        gap: 12px;
        padding: 12px;
        width: 60px;
        height: 60px;
        max-width: none;
        margin: 12px 16px;
        top: 12px;
        background: none;
        border-radius: 16px;
        backdrop-filter: blur(25px);
      }

      .site-nav::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255,255,255,0.1);
        border-radius: 16px;
        z-index: -1;
      }

      #mobile-menu-btn {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 4px;
        background: none;
        border: none;
        padding: 8px;
        cursor: pointer;
        z-index: 40;
        width: 44px;
        height: 44px;
        border-radius: 12px;
        transition: all var(--ease);
      }

      #mobile-menu-btn span {
        width: 24px;
        height: 2px;
        background: var(--muted-strong);
        transition: all var(--ease);
        transform-origin: center;
      }

      body.mobile-nav-open #mobile-menu-btn span:nth-child(1) {
        transform: rotate(45deg) translate(6px, 6px);
      }

      body.mobile-nav-open #mobile-menu-btn span:nth-child(2) {
        opacity: 0;
      }

      body.mobile-nav-open #mobile-menu-btn span:nth-child(3) {
        transform: rotate(-45deg) translate(6px, -6px);
      }

      .nav-links {
        position: fixed;
        top: 0;
        left: 0;
        width: min(320px, 85vw);
        height: 100dvh;
        background: rgba(255,255,255,0.18);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        flex-direction: column;
        padding: 0;
        gap: 0;
        translate: -100% 0;
        transition: translate var(--ease);
        z-index: 35;
        box-shadow: 4px 0 32px rgba(0,0,0,0.3);
        overflow: hidden;
      }

      .nav-links::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255,255,255,0.08);
        z-index: -1;
      }

      body.mobile-nav-open .nav-links {
        translate: 0 0;
      }

      .nav-link {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        padding: 20px 24px;
        margin: 0;
        min-height: 64px;
        font-size: 16px;
        border-radius: 0;
        width: 100%;
        border: none;
        background: none;
        justify-content: flex-start;
        transition: all var(--ease);
      }

      .nav-link.active {
        background: rgba(170, 205, 220, 0.4);
        color: white !important;
      }

      #indicator {
        position: absolute !important;
        border-radius: 16px;
      }

      #nav-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0,0,0,0.4);
        z-index: 31;
        opacity: 0;
        visibility: hidden;
        transition: all var(--ease);
      }

      body.mobile-nav-open #nav-overlay {
        opacity: 1;
        visibility: visible;
      }

      body.mobile-nav-open {
        overflow: hidden;
      }
    }

    /* ── Home section layout ─────────────────────────── */
    #home-section {
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      /* Add subtle visual depth to background */
      background: radial-gradient(circle at 70% 50%, rgba(170, 205, 220, 0.3) 0%, transparent 60%);
    }

    .home-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: var(--content-width);
      margin: 0 auto;
      padding: 0 24px;
      gap: 60px;
      height: calc(100vh - 140px); /* Fill space safely without triggering scroll */
      box-sizing: border-box;
    }

    .home-left { 
      flex: 1; 
      padding-right: 2vw;
    }

    .brand-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 6vw, 80px);
      color: #1f150f;
      line-height: 1.1;
      letter-spacing: 4px;
      margin: 0;
      white-space: nowrap;
      text-shadow: 2px 4px 12px rgba(0, 0, 0, 0.08); /* Subtle depth */
    }

    .brand-tagline {
      font-family: 'Sora', sans-serif;
      font-size: clamp(16px, 2vw, 24px);
      color: #1f150f;
      opacity: 0.85;
      margin-top: 18px; /* Increased typography spacing */
      font-weight: 500;
      text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.04);
    }

    /* ── Feature Pill ─────────────────────────────────── */
    .feature-pill {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 8px 18px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #1f150f;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    .feature-pill span {
      opacity: 0.85;
    }
    .feature-pill .dot {
      width: 4px;
      height: 4px;
      background: #1f150f;
      border-radius: 50%;
      opacity: 0.4;
    }

    .home-right {
      flex: 0 0 auto;
    }

    .custom-order-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .custom-order-img {
      max-width: 460px; /* Increased image size */
      max-height: 55vh;
      width: 100%;
      object-fit: contain;
      border-radius: 22px;
      box-shadow:
        0 0 35px rgba(170, 205, 220, 0.6),
        0 0 70px rgba(170, 205, 220, 0.35);
      animation: imgGlow 3s ease-in-out infinite alternate;
      transition: transform 0.4s ease;
    }
    .custom-order-img:hover { transform: scale(1.02); }

    @keyframes imgGlow {
      from { box-shadow: 0 0 35px rgba(170,205,220,0.6), 0 0 70px rgba(170,205,220,0.35); }
      to   { box-shadow: 0 0 50px rgba(170,205,220,0.85), 0 0 100px rgba(170,205,220,0.5); }
    }

    .custom-order-btn {
      padding: 15px 40px;
      background: linear-gradient(135deg, #AACDDC 0%, #90C1D2 100%);
      border: none;
      border-radius: 999px;
      color: #1f150f;
      font-family: 'Sora', sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow:
        0 0 22px rgba(170,205,220,0.55),
        0 0 44px rgba(170,205,220,0.25);
      animation: btnGlow 3s ease-in-out infinite alternate;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    @keyframes btnGlow {
      from { box-shadow: 0 0 22px rgba(170,205,220,0.55), 0 0 44px rgba(170,205,220,0.25); }
      to   { box-shadow: 0 0 34px rgba(170,205,220,0.75), 0 0 68px rgba(170,205,220,0.4); }
    }

    .custom-order-btn:hover {
      transform: translateY(-4px) scale(1.07);
      box-shadow:
        0 0 38px rgba(170,205,220,0.85),
        0 0 76px rgba(170,205,220,0.5),
        0 10px 28px rgba(0,0,0,0.13);
      animation: none;
    }
    .custom-order-btn:active {
      transform: translateY(-1px) scale(1.03);
    }

    /* ── Scroll hint ──────────────────────────────────── */
    .scroll-hint {
      position: absolute;
      bottom: 120px; /* Moved up significantly from bottom */
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      pointer-events: none;
    }

    .scroll-text {
      font-size: 12px;
      font-weight: 500;
      color: #1f150f;
      opacity: 0;
      animation: textPeek 5s ease-in-out infinite;
      white-space: nowrap;
    }

    @keyframes textPeek {
      0%, 65%, 100% { opacity: 0; transform: translateY(4px); }
      18%, 50%      { opacity: 0.75; transform: translateY(0); }
    }

    .scroll-arrow {
      color: #1f150f;
      opacity: 0.65;
      animation: arrowBounce 1.8s ease-in-out infinite;
    }

    @keyframes arrowBounce {
      0%, 100% { transform: translateY(0); opacity: 0.65; }
      50%      { transform: translateY(10px); opacity: 1; }
    }

    /* ── Glassmorphism popup ──────────────────────────── */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }
    .popup-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .popup-card {
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 26px;
      padding: 48px;
      width: calc(100vw - 20px);
      height: calc(100vh - 20px);
      max-width: none;
      position: relative;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.22);
      transform: scale(0.9) translateY(24px);
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      overflow-y: auto; /* allow scrolling inside if needed */
    }
    .popup-overlay.open .popup-card {
      transform: scale(1) translateY(0);
    }

    .popup-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      color: #1f150f;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: all 0.3s ease;
    }
    .popup-close:hover {
      background: rgba(255, 255, 255, 0.32);
      transform: rotate(90deg);
      border-color: rgba(255,255,255,0.45);
    }

    /* ── Home mobile responsive ──────────────────────── */
    @media (max-width: 768px) {
      .home-content {
        flex-direction: column;
        justify-content: center;
        text-align: center;
        gap: 28px;
        padding: 0 16px;
      }
      .brand-title {
        font-size: clamp(36px, 11vw, 58px);
      }
      .custom-order-img {
        max-width: 220px;
      }
      .custom-order-btn {
        padding: 13px 32px;
        font-size: 15px;
      }
    }

    #products-section {
      height: 100vh;
      background: #F3E3D0; /* Keep theme background */
    }

    /* ── Custom Order Form Styles ── */
    .popup-card {
      padding: 32px 48px;
      max-width: 800px;
      height: auto;
      max-height: 90vh;
      color: #1f150f;
    }
    .popup-card h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }
    .custom-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .full-width {
      grid-column: span 2;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-group label {
      font-size: 13px;
      font-weight: 700;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input, .form-group select, .form-group textarea {
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.1);
      background: rgba(255, 255, 255, 0.4);
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: #72a5b8;
      background: white;
      box-shadow: 0 0 0 4px rgba(114, 165, 184, 0.15);
    }
    .form-group input:invalid:not(:placeholder-shown) {
      border-color: #ff4d4d;
    }
    .upload-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .upload-box {
      border: 2px dashed rgba(0,0,0,0.15);
      border-radius: 20px;
      height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.2);
    }
    .upload-box:hover {
      border-color: #72a5b8;
      background: rgba(114, 165, 184, 0.05);
      transform: translateY(-2px);
    }
    .upload-placeholder {
      font-size: 12px;
      text-align: center;
      opacity: 0.6;
      pointer-events: none;
    }
    .upload-placeholder svg {
      width: 32px;
      height: 32px;
      margin-bottom: 8px;
      opacity: 0.5;
    }
    .image-preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      z-index: 2;
    }
    .options-row {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      padding: 16px;
      background: rgba(255,255,255,0.2);
      border-radius: 16px;
    }
    .radio-group {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .radio-group label {
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      text-transform: none;
      font-size: 14px;
    }
    .submit-btn {
      width: 100%;
      margin-top: 10px;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: #1f150f;
      color: white;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .submit-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }
    .submit-btn:not(:disabled):hover {
      background: #3a2a1e;
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.2);
    }
    .submit-btn:active {
      transform: translateY(-2px);
    }
    @media (max-width: 768px) {
      .popup-card {
        padding: 32px 24px;
        width: 95vw;
      }
      .form-grid, .upload-row {
        grid-template-columns: 1fr;
      }
      .full-width {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  <nav class="site-nav">

    <button id="mobile-menu-btn" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="nav-links">
      <a class="nav-link active" href="index.html"><img class="nav-icon" src="homef.png" data-normal="homen.png" data-active="homef.png" alt="Home" style="width:20px;height:20px;margin-right:8px;">Home</a>
      <a class="nav-link" href="products.html"><img class="nav-icon" src="productsn.png" data-normal="productsn.png" data-active="productsf.png" alt="Products" style="width:20px;height:20px;margin-right:8px;">Products</a>
      <a class="nav-link" href="cart.html"><img class="nav-icon" src="cartn.png" data-normal="cartn.png" data-active="cartf.png" alt="Cart" style="width:20px;height:20px;margin-right:8px;">Cart</a>
      <a class="nav-link auth-nav-btn" href="login.html"><img class="nav-icon" src="accn.png" data-normal="accn.png" data-active="accf.png" alt="Login/SignUp" style="width:20px;height:20px;margin-right:8px;">Login/SignUp</a>
      <button class="nav-link user-nav-btn" id="nav-user-btn" style="display: none;"><img class="nav-icon" src="accn.png" data-normal="accn.png" data-active="accf.png" alt="User" style="width:20px;height:20px;margin-right:8px;"><span id="nav-username">User</span></button>
      <a class="nav-link admin-nav-btn" href="admin.html" id="nav-admin-link" style="display: none;"><img class="nav-icon" src="accn.png" data-normal="accn.png" data-active="accf.png" alt="Admin" style="width:20px;height:20px;margin-right:8px;">Admin</a>
    </div>
  </nav>

  <div id="nav-overlay"></div>

  <div id="mainContent">
    <section id="home-section">
      <div class="home-content">
        <div class="home-left">
          <div class="feature-pill">
            <span>Custom Design</span><div class="dot"></div>
            <span>Best Price</span><div class="dot"></div>
            <span>ALL IN DELIVERY</span>
          </div>
          <h1 class="brand-title">ESS KAY SPORTS WEAR</h1>
          <p class="brand-tagline">Where Comfort Means Professionalism.</p>
        </div>
        <div class="home-right">
          <div class="custom-order-wrapper">
            <img src="CustomOrderImg.png" alt="Custom Order" class="custom-order-img">
            <button class="custom-order-btn" id="customOrderBtn">Custom Order</button>
          </div>
        </div>
      </div>
      <div class="scroll-hint">
        <span class="scroll-text">Scroll Down For Products..</span>
        <div class="scroll-arrow">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14m0 0l-6-6m6 6l6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </section>
    <section id="products-section">
      <!-- Products content goes here -->
    </section>
  </div>

  <!-- Custom Order Popup -->
  <div class="popup-overlay" id="customPopup">
    <div class="popup-card">
      <button class="popup-close" id="popupClose">&times;</button>
      <h2>Custom Order</h2>
      <form id="customOrderForm" class="custom-form">
        <div class="form-grid">
          <!-- Type -->
          <div class="form-group">
            <label>Product Type</label>
            <select name="type" required>
              <option value="" disabled selected>Select Type</option>
              <option value="T-shirt">T-shirt</option>
              <option value="Lower">Lower</option>
            </select>
          </div>
          <!-- Fabric -->
          <div class="form-group">
            <label>Fabric</label>
            <input type="text" name="fabric" placeholder="e.g. Cotton, Lycra, Dry-fit" required>
          </div>
          <!-- Size -->
          <div class="form-group">
            <label>Size</label>
            <select name="size" required>
              <option value="" disabled selected>Select Size</option>
              <option value="S">Small (S)</option>
              <option value="M">Medium (M)</option>
              <option value="L">Large (L)</option>
              <option value="XL">Extra Large (XL)</option>
              <option value="XXL">Double XL (XXL)</option>
            </select>
          </div>
          <!-- Quantity -->
          <div class="form-group">
            <label>Quantity</label>
            <input type="number" name="quantity" min="1" value="1" required>
          </div>
          <!-- Gender -->
          <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
              <option value="" disabled selected>Select Gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
          <!-- Address -->
          <div class="form-group full-width">
            <label>Delivery Address</label>
            <textarea name="address" rows="2" placeholder="Enter your full address with pincode" required></textarea>
          </div>
          
          <!-- Image Uploads -->
          <div class="form-group">
            <label>Front Design Image (Required)</label>
            <div class="upload-box" id="frontUploadBox">
              <input type="file" id="frontImage" accept="image/*" required hidden>
              <div class="upload-placeholder">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span>Upload Front View</span>
              </div>
              <img id="frontPreview" class="image-preview" src="" alt="">
            </div>
          </div>
          <div class="form-group">
            <label>Back Design Image (Required)</label>
            <div class="upload-box" id="backUploadBox">
              <input type="file" id="backImage" accept="image/*" required hidden>
              <div class="upload-placeholder">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span>Upload Back View</span>
              </div>
              <img id="backPreview" class="image-preview" src="" alt="">
            </div>
          </div>

          <!-- Custom Options -->
          <div class="form-group">
            <label>Collar</label>
            <div class="radio-group">
              <label><input type="radio" name="collar" value="Yes" required> Yes</label>
              <label><input type="radio" name="collar" value="No"> No</label>
            </div>
          </div>
          <div class="form-group">
            <label>Chain Type</label>
            <select name="chainType" required>
              <option value="No Chain">No Chain</option>
              <option value="Half Chain">Half Chain</option>
              <option value="Full Chain">Full Chain</option>
            </select>
          </div>
          <div class="form-group">
            <label>Sleeves</label>
            <select name="sleeves" required>
              <option value="Half Sleeves">Half Sleeves</option>
              <option value="Full Sleeves">Full Sleeves</option>
            </select>
          </div>

          <!-- Notes -->
          <div class="form-group full-width">
            <label>Additional Notes (Optional)</label>
            <textarea name="notes" rows="2" placeholder="Any extra instructions..."></textarea>
          </div>
        </div>
        
        <button type="submit" id="submitOrderBtn" class="submit-btn" disabled>Place Custom Order</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { auth, rtdb } from './firebase.js';
    import { ref, push, serverTimestamp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
    import { showToast, updateToast } from './toast-system.js';

    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('customOrderBtn');
      const popup = document.getElementById('customPopup');
      const close = document.getElementById('popupClose');
      const form = document.getElementById('customOrderForm');
      const submitBtn = document.getElementById('submitOrderBtn');
      
      const frontInput = document.getElementById('frontImage');
      const backInput = document.getElementById('backImage');
      const frontUploadBox = document.getElementById('frontUploadBox');
      const backUploadBox = document.getElementById('backUploadBox');
      const frontPreview = document.getElementById('frontPreview');
      const backPreview = document.getElementById('backPreview');

      let currentUser = null;

      onAuthStateChanged(auth, (user) => {
        currentUser = user;
      });

      if (btn && popup && close) {
        btn.addEventListener('click', () => {
          if (!currentUser) {
            window.location.href = 'login.html';
            return;
          }
          popup.classList.add('open');
        });
        close.addEventListener('click', () => popup.classList.remove('open'));
        popup.addEventListener('click', (e) => {
          if (e.target === popup) popup.classList.remove('open');
        });
      }

      // Image Upload Handling
      const handleImageUpload = (input, preview, box) => {
        const file = input.files[0];
        if (file) {
          if (file.size > 500000) { // 500KB limit for RTDB base64
            showToast('Image too large (max 500KB)', 'error');
            input.value = '';
            return;
          }
          const reader = new FileReader();
          reader.onload = (e) => {
            preview.src = e.target.result;
            preview.style.display = 'block';
            box.querySelector('.upload-placeholder').style.display = 'none';
            validateForm();
          };
          reader.readAsDataURL(file);
        }
      };

      frontUploadBox?.addEventListener('click', () => frontInput.click());
      backUploadBox?.addEventListener('click', () => backInput.click());
      frontInput?.addEventListener('change', () => handleImageUpload(frontInput, frontPreview, frontUploadBox));
      backInput?.addEventListener('change', () => handleImageUpload(backInput, backPreview, backUploadBox));

      // Validation
      const validateForm = () => {
        const isValid = form.checkValidity() && frontInput.files.length > 0 && backInput.files.length > 0;
        submitBtn.disabled = !isValid;
      };

      form?.addEventListener('input', validateForm);
      form?.addEventListener('change', validateForm);

      // Form Submit
      form?.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!currentUser) return;

        const toast = showToast('Placing your order...', 'loading');
        submitBtn.disabled = true;
        const originalBtnText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<div class="toast-spinner" style="width:20px;height:20px;border-width:3px;"></div> Processing...';

        const formData = new FormData(form);
        const orderData = {
          userId: currentUser.uid,
          userEmail: currentUser.email,
          timestamp: serverTimestamp(),
          type: formData.get('type'),
          fabric: formData.get('fabric'),
          size: formData.get('size'),
          quantity: parseInt(formData.get('quantity')),
          gender: formData.get('gender'),
          address: formData.get('address'),
          collar: formData.get('collar'),
          chainType: formData.get('chainType'),
          sleeves: formData.get('sleeves'),
          notes: formData.get('notes'),
          frontImage: frontPreview.src,
          backImage: backPreview.src,
          status: 'pending'
        };

        try {
          await push(ref(rtdb, 'customOrders'), orderData);
          updateToast(toast, 'Custom order placed successfully!', 'success');
          
          // Reset form
          form.reset();
          frontPreview.style.display = 'none';
          backPreview.style.display = 'none';
          frontUploadBox.querySelector('.upload-placeholder').style.display = 'flex';
          backUploadBox.querySelector('.upload-placeholder').style.display = 'flex';
          validateForm();
          
          setTimeout(() => popup.classList.remove('open'), 1000);
        } catch (error) {
          updateToast(toast, 'Failed to place order: ' + error.message, 'error');
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalBtnText;
        }
      });
    });
  </script>

  <script src="scroll-behavior.js"></script>
</body>
</html>
