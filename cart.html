<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - EssKay Sportswear</title>
  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="navbar-complete.js"></script>
  <script src="navbar-script.js"></script>
  <script type="module" src="auth.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #0a1018;
      --surface: rgba(255, 255, 255, 0.08);
      --surface-strong: rgba(8, 13, 21, 0.74);
      --surface-muted: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.12);
      --border-strong: rgba(123, 231, 255, 0.18);
      --text: #f8fbff;
      --muted: #aab4c2;
      --muted-strong: #D2C4B4;
      --accent: #7be7ff;
      --accent-strong: #96fff0;
      --shadow: 0 25px 80px rgba(0, 0, 0, 0.45);
      --radius-lg: 32px;
      --content-width: min(1240px, calc(100% - 32px));
      --ease: 220ms ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Sora", sans-serif;
      color: var(--text);
      background: #F3E3D0;
      min-height: 100vh;
    }

    /* Desktop styles */
    .site-nav {
      position: relative;
      top: 18px;
      z-index: 30;
      width: var(--content-width);
      margin: 18px auto 0;
      padding: 14px 18px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(25px);
      position: sticky;
    }

    @media (min-width: 769px) {
      #mobile-menu-btn {
        display: none;
      }
      .nav-links {
        translate: none !important;
      }
    }

    #indicator {
      position: absolute;
      top: 5px;
      left: 0;
      height: calc(100% - 10px);
      border-radius: 999px;
      background: #AACDDC;
      z-index: 1;
      transition: all 0.3s cubic-bezier(0.25,1,0.5,1);
      width: 0;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-link {
      position: relative;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      transition: transform var(--ease), border-color var(--ease), background var(--ease), box-shadow var(--ease), color var(--ease);
      border: 1px solid transparent;
      color: #000000;
      text-decoration: none;
    }

    .nav-link.active {
      background: #AACDDC;
      color: white;
      border-radius: 999px;
    }

    .nav-link:hover {
      transform: translateY(-2px);
      border-color: var(--border-strong);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 18px 38px rgba(5, 15, 25, 0.45);
    }

    button.nav-link {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: inherit;
      padding: 0 18px;
    }

    /* Mobile styles */
    @media (max-width: 768px) {
      .site-nav {
        justify-content: flex-start;
        gap: 12px;
        padding: 12px;
        width: auto;
        max-width: calc(100vw - 32px);
        margin: 12px auto 0;
        top: 12px;
      }

      #mobile-menu-btn {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 4px;
        background: none;
        border: none;
        padding: 8px;
        cursor: pointer;
        z-index: 40;
        width: 44px;
        height: 44px;
        border-radius: 12px;
        transition: all var(--ease);
      }

      #mobile-menu-btn span {
        width: 24px;
        height: 2px;
        background: var(--muted-strong);
        transition: all var(--ease);
        transform-origin: center;
      }

      body.mobile-nav-open #mobile-menu-btn span:nth-child(1) {
        transform: rotate(45deg) translate(6px, 6px);
      }

      body.mobile-nav-open #mobile-menu-btn span:nth-child(2) {
        opacity: 0;
      }

      body.mobile-nav-open #mobile-menu-btn span:nth-child(3) {
        transform: rotate(-45deg) translate(6px, -6px);
      }

      .nav-links {
        position: fixed;
        top: 0;
        left: 0;
        width: 280px;
        height: 100vh;
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(25px);
        flex-direction: column;
        padding: 80px 20px 20px;
        gap: 0;
        translate: -100% 0;
        transition: translate var(--ease);
        z-index: 35;
        box-shadow: var(--shadow);
      }

      body.mobile-nav-open .nav-links {
        translate: 0 0;
      }

      .nav-link {
        justify-content: flex-start;
        padding: 16px 20px;
        margin-bottom: 8px;
        min-height: 56px;
        font-size: 16px;
        border-radius: 16px;
        width: 100%;
      }

      #indicator {
        position: absolute !important;
        border-radius: 16px;
      }

      #nav-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0,0,0,0.5);
        z-index: 32;
        opacity: 0;
        visibility: hidden;
        transition: all var(--ease);
      }

      body.mobile-nav-open #nav-overlay {
        opacity: 1;
        visibility: visible;
      }

      body.mobile-nav-open {
        overflow: hidden;
      }
    }
  </style>
</head>

<body>
  <nav class="site-nav">

    <button id="mobile-menu-btn" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="nav-links">
      <a class="nav-link" href="index.html"><img class="nav-icon" src="homen.png" data-normal="homen.png" data-active="homef.png" alt="Home" style="width:20px;height:20px;margin-right:8px;">Home</a>
      <a class="nav-link" href="products.html"><img class="nav-icon" src="productsn.png" data-normal="productsn.png" data-active="productsf.png" alt="Products" style="width:20px;height:20px;margin-right:8px;">Products</a>
      <a class="nav-link active" href="cart.html"><img class="nav-icon" src="cartf.png" data-normal="cartn.png" data-active="cartf.png" alt="Cart" style="width:20px;height:20px;margin-right:8px;">Cart</a>
      <a class="nav-link auth-nav-btn" href="login.html"><img class="nav-icon" src="accn.png" data-normal="accn.png" data-active="accf.png" alt="Login/SignUp" style="width:20px;height:20px;margin-right:8px;">Login/SignUp</a>
      <button class="nav-link user-nav-btn" id="nav-user-btn" style="display: none;"><img class="nav-icon" src="accn.png" data-normal="accn.png" data-active="accf.png" alt="User" style="width:20px;height:20px;margin-right:8px;"><span id="nav-username">User</span></button>
      <button class="nav-link user-nav-btn" id="nav-logout-btn" style="display: none; padding: 0 12px; font-size: 14px;"><img class="nav-icon" src="accn.png" data-normal="accn.png" data-active="accf.png" alt="Logout" style="width:16px;height:16px;margin-right:4px;">Logout</button>
    </div>
  </nav>

  <div id="nav-overlay"></div>

  <div id="mainContent">
    <h1>Shopping Cart</h1>
    <p>Your cart items will be loaded here via app.js.</p>
  </div>
</body>
</html>
