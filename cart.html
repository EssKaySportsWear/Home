<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - EssKay Sportswear</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="module" src="navbar-complete.js"></script>
  <style>
    :root {
      --bg: #F3E3D0;
      --accent: #72a5b8;
      --text: #1f150f;
      --ease: 220ms ease;
      --content-width: min(1240px, calc(100% - 32px));
    }
    body {
      margin: 0;
      font-family: "Sora", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .site-nav {
      position: sticky;
      top: 18px;
      z-index: 1000;
      width: var(--content-width);
      margin: 18px auto 0;
      padding: 14px 18px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .nav-links { display: flex; align-items: center; gap: 8px; }
    .nav-link {
      position: relative;
      display: inline-flex;
      align-items: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      color: #000000;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    .nav-link.active {
      background: #AACDDC;
      color: #1f150f;
      border-radius: 999px;
      font-weight: 700;
    }
    .nav-link:hover { transform: translateY(-2px); background: rgba(255,255,255,0.2); }

    #mobile-menu-btn { display: none; background: none; border: none; padding: 8px; cursor: pointer; }
    button.nav-link {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: inherit;
      padding: 0 18px;
    }
    @media (max-width: 768px) {
      .site-nav { justify-content: flex-start; margin: 12px auto; top: 12px; }
      #mobile-menu-btn { display: flex; flex-direction: column; gap: 4px; }
      #mobile-menu-btn span { width: 24px; height: 2px; background: #000; }
      .nav-links {
        position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
        background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
        flex-direction: column; padding: 80px 20px; translate: -100% 0;
        transition: translate 0.3s ease;
      }
      body.mobile-nav-open .nav-links { translate: 0 0; }
      .nav-link { width: 100%; justify-content: flex-start; }
    }

    .cart-container {
      max-width: 1200px;
      margin: 60px auto;
      padding: 0 24px;
    }
    .cart-header { margin-bottom: 48px; }
    .cart-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 64px; margin: 0; letter-spacing: 2px; }

    .cart-grid { display: grid; grid-template-columns: 1fr 380px; gap: 40px; }
    @media (max-width: 968px) { .cart-grid { grid-template-columns: 1fr; } }

    .cart-item {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 24px;
      display: flex;
      gap: 24px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }
    .item-img { width: 120px; height: 120px; border-radius: 16px; object-fit: cover; }
    .item-info { flex: 1; }
    .item-details { display: flex; gap: 16px; margin-bottom: 16px; font-size: 14px; opacity: 0.6; }
    .color-preview { width: 14px; height: 14px; border-radius: 50%; display: inline-block; vertical-align: middle; border: 1px solid rgba(0,0,0,0.1); }
    .item-qty-controls { display: flex; align-items: center; gap: 16px; }
    .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .remove-btn { color: #ff4d4d; background: none; border: none; cursor: pointer; font-size: 14px; font-weight: 600; margin-top: 12px; }

    .order-summary { background: #1f150f; color: white; border-radius: 32px; padding: 32px; height: fit-content; position: sticky; top: 120px; }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 16px; }
    .summary-total { border-top: 1px solid rgba(255,255,255,0.1); margin-top: 24px; padding-top: 24px; font-size: 24px; font-weight: 700; }
    .checkout-btn { width: 100%; background: var(--accent); color: white; border: none; border-radius: 16px; padding: 18px; font-family: 'Bebas Neue', sans-serif; font-size: 24px; cursor: pointer; margin-top: 32px; }

    .empty-cart { text-align: center; padding: 80px 20px; }
    .empty-cart h2 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; }
    .shop-now { display: inline-block; margin-top: 24px; background: #1f150f; color: white; padding: 16px 40px; border-radius: 14px; text-decoration: none; font-weight: 600; }

    .checkout-modal {
      position: fixed;
      inset: 0;
      background: rgba(20, 15, 12, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 2100;
    }
    .checkout-modal.open { display: flex; }
    .checkout-panel {
      width: min(560px, 100%);
      background: rgba(255, 250, 244, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 28px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.2);
      padding: 28px;
      color: var(--text);
      position: relative;
    }
    .checkout-panel h2 {
      margin: 0 0 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px;
      letter-spacing: 1.5px;
    }
    .checkout-panel p {
      margin: 0 0 24px;
      opacity: 0.75;
      line-height: 1.6;
      font-size: 14px;
    }
    .checkout-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(31, 21, 15, 0.08);
      color: var(--text);
      cursor: pointer;
      font-size: 22px;
    }
    .checkout-form { display: grid; gap: 16px; }
    .checkout-field { display: grid; gap: 8px; }
    .checkout-field label { font-size: 13px; font-weight: 700; opacity: 0.8; }
    .checkout-field input,
    .checkout-field textarea {
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(31, 21, 15, 0.1);
      background: rgba(255, 255, 255, 0.8);
      padding: 14px 16px;
      font: inherit;
      color: var(--text);
      outline: none;
      transition: border-color var(--ease), box-shadow var(--ease);
      box-sizing: border-box;
    }
    .checkout-field textarea {
      min-height: 120px;
      resize: vertical;
    }
    .checkout-field input:focus,
    .checkout-field textarea:focus {
      border-color: #90C1D2;
      box-shadow: 0 0 0 4px rgba(114, 165, 184, 0.14);
    }
    .checkout-note { margin: -4px 0 0; font-size: 12px; opacity: 0.65; }
    .checkout-meta {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 4px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(31, 21, 15, 0.06);
      font-size: 14px;
      font-weight: 600;
    }
    .checkout-submit {
      width: 100%;
      margin-top: 8px;
      border: none;
      border-radius: 18px;
      background: #1f150f;
      color: white;
      padding: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 1px;
      cursor: pointer;
    }
    .checkout-submit:disabled { opacity: 0.7; cursor: wait; }
    @media (max-width: 640px) {
      .checkout-panel { padding: 22px; border-radius: 24px; }
      .checkout-meta { flex-direction: column; }
    }
  </style>
  <link rel="stylesheet" href="theme.css">
</head>
<body class="cart-page">

  <nav class="site-nav">
    <button id="mobile-menu-btn" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links">
      <a class="nav-link" href="index.html"><img class="nav-icon" src="homen.png" data-normal="homen.png" data-active="homef.png" alt="Home" style="width:20px;height:20px;margin-right:8px;">Home</a>
      <a class="nav-link" href="index.html#products-section"><img class="nav-icon" src="productsn.png" data-normal="productsn.png" data-active="productsf.png" alt="Products" style="width:20px;height:20px;margin-right:8px;">Products</a>
      <a class="nav-link active" href="cart.html"><img class="nav-icon" src="cartn.png" data-normal="cartn.png" data-active="cartf.png" alt="Cart" style="width:20px;height:20px;margin-right:8px;">Cart</a>
      <a class="nav-link" href="orders.html"><img class="nav-icon" src="cartn.png" data-normal="cartn.png" data-active="cartf.png" alt="Orders" style="width:20px;height:20px;margin-right:8px;">My Orders</a>
      <a class="nav-link auth-nav-btn" href="login.html" style="display:none;"><img class="nav-icon" src="accn.png" data-normal="accn.png" data-active="accf.png" style="width:20px;height:20px;margin-right:8px;">Login/SignUp</a>
      <button class="nav-link user-nav-btn" id="nav-user-btn" style="display:none;"><img class="nav-icon" src="accn.png" data-normal="accn.png" data-active="accf.png" style="width:20px;height:20px;margin-right:8px;"><span id="nav-username">User</span></button>
      <a class="nav-link admin-nav-btn" href="admin.html" id="nav-admin-link" style="display:none;"><img class="nav-icon" src="accn.png" data-normal="accn.png" data-active="accf.png" alt="Admin" style="width:20px;height:20px;margin-right:8px;">Admin</a>
    </div>
  </nav>

  <div class="cart-container" id="cart-content">
    <div id="loading-cart" style="text-align: center; padding: 100px;">
      <p style="opacity: 0.5;">Loading your bag...</p>
    </div>
  </div>

  <div class="checkout-modal" id="checkout-modal" aria-hidden="true">
    <div class="checkout-panel" role="dialog" aria-modal="true" aria-labelledby="checkout-modal-title">
      <button class="checkout-close" id="checkout-close-btn" type="button" aria-label="Close checkout">&times;</button>
      <h2 id="checkout-modal-title">Checkout</h2>
      <p>Confirm your delivery details and place this order with Cash on Delivery.</p>
      <form class="checkout-form" id="checkout-modal-form">
        <div class="checkout-field">
          <label for="checkout-name">Full Name</label>
          <input type="text" id="checkout-name" required>
        </div>
        <div class="checkout-field" id="checkout-phone-wrap" style="display:none;">
          <label for="checkout-phone">Phone Number</label>
          <input type="tel" id="checkout-phone" placeholder="10-digit phone number" maxlength="10" inputmode="numeric">
          <div class="checkout-note">Google sign-in accounts need a phone number before placing the order.</div>
        </div>
        <div class="checkout-field">
          <label for="checkout-address">Delivery Address</label>
          <textarea id="checkout-address" placeholder="Enter your full address with pincode" required></textarea>
        </div>
        <div class="checkout-meta">
          <span>Payment: COD</span>
          <span id="checkout-total-label">Total: Rs 0.00</span>
        </div>
        <button type="submit" class="checkout-submit" id="checkout-submit-btn">Place Order</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { auth, rtdb } from './firebase.js';
    import { ref, get, onValue, push, update, remove } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
    import { showToast, showConfirm, updateToast } from './toast-system.js';

    const checkoutModal = document.getElementById('checkout-modal');
    const checkoutModalForm = document.getElementById('checkout-modal-form');
    const checkoutCloseBtn = document.getElementById('checkout-close-btn');
    const checkoutNameInput = document.getElementById('checkout-name');
    const checkoutPhoneWrap = document.getElementById('checkout-phone-wrap');
    const checkoutPhoneInput = document.getElementById('checkout-phone');
    const checkoutAddressInput = document.getElementById('checkout-address');
    const checkoutSubmitBtn = document.getElementById('checkout-submit-btn');
    const checkoutTotalLabel = document.getElementById('checkout-total-label');

    let activeCheckoutContext = null;

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        document.getElementById('cart-content').innerHTML = `
          <div class="empty-cart">
            <h2>Please login to view your cart</h2>
            <a href="login.html" class="shop-now">Login Now</a>
          </div>
        `;
        return;
      }
      initCart(user);
    });

    checkoutCloseBtn?.addEventListener('click', closeCheckoutModal);
    checkoutModal?.addEventListener('click', (event) => {
      if (event.target === checkoutModal) closeCheckoutModal();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && checkoutModal?.classList.contains('open')) {
        closeCheckoutModal();
      }
    });
    checkoutPhoneInput?.addEventListener('input', () => {
      checkoutPhoneInput.value = checkoutPhoneInput.value.replace(/\D/g, '').slice(0, 10);
    });
    checkoutModalForm?.addEventListener('submit', submitCheckoutModal);

    function initCart(user) {
      const cartRef = ref(rtdb, `carts/${user.uid}`);
      onValue(cartRef, (snap) => {
        if (!snap.exists()) {
          renderEmpty();
          return;
        }
        renderCart(user, snap.val());
      });
    }

    function renderEmpty() {
      document.getElementById('cart-content').innerHTML = `
        <div class="empty-cart">
          <h2>Your bag is empty</h2>
          <a href="index.html#products-section" class="shop-now">Continue Shopping</a>
        </div>
      `;
    }

    function openCheckoutModal() {
      checkoutModal.classList.add('open');
      checkoutModal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      setTimeout(() => {
        if (!checkoutNameInput.value.trim()) {
          checkoutNameInput.focus();
          return;
        }
        if (checkoutPhoneWrap.style.display !== 'none') {
          checkoutPhoneInput.focus();
          return;
        }
        checkoutAddressInput.focus();
      }, 20);
    }

    function closeCheckoutModal() {
      checkoutModal.classList.remove('open');
      checkoutModal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      activeCheckoutContext = null;
      checkoutModalForm.reset();
      checkoutPhoneWrap.style.display = 'none';
      checkoutPhoneInput.required = false;
      checkoutSubmitBtn.disabled = false;
      checkoutSubmitBtn.textContent = 'Place Order';
    }

    async function prepareCheckoutModal(user, cartData) {
      const items = Object.values(cartData);
      if (items.length === 0) {
        showToast('Your bag is empty.', 'error');
        return;
      }

      const subtotal = items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const gst = subtotal * 0.05;
      const total = subtotal + gst;
      const toast = showToast('Preparing checkout...', 'loading');

      try {
        const userSnap = await get(ref(rtdb, `users/${user.uid}`));
        const userData = userSnap.exists() ? userSnap.val() : {};

        if (userData?.orderBlocked === true) {
          updateToast(toast, 'Orders are blocked for this account. Please contact support.', 'error');
          return;
        }

        const isGoogleUser = user.providerData.some((provider) => provider.providerId === 'google.com') || userData?.provider === 'google';
        const savedPhone = userData?.phone && userData.phone !== 'Not provided' ? userData.phone : '';

        activeCheckoutContext = {
          user,
          items,
          subtotal,
          gst,
          total,
          isGoogleUser,
          savedPhone
        };

        checkoutNameInput.value = userData?.name || user.displayName || user.email.split('@')[0] || '';
        checkoutAddressInput.value = userData?.address || '';
        checkoutPhoneInput.value = savedPhone;
        checkoutPhoneWrap.style.display = isGoogleUser ? 'grid' : 'none';
        checkoutPhoneInput.required = isGoogleUser;
        checkoutTotalLabel.textContent = `Total: Rs ${total.toFixed(2)}`;

        updateToast(toast, 'Checkout is ready.', 'success');
        openCheckoutModal();
      } catch (error) {
        console.error(error);
        updateToast(toast, 'Checkout failed: ' + error.message, 'error');
      }
    }

    async function submitCheckoutModal(event) {
      event.preventDefault();

      if (!activeCheckoutContext) {
        showToast('Checkout session expired. Please try again.', 'error');
        return;
      }

      const { user, items, subtotal, gst, total, isGoogleUser, savedPhone } = activeCheckoutContext;
      const fullName = checkoutNameInput.value.trim();
      const address = checkoutAddressInput.value.trim();
      const phone = isGoogleUser ? checkoutPhoneInput.value.trim() : savedPhone;

      if (!fullName) return showToast('Please enter your full name.', 'error');
      if (isGoogleUser && !/^[16789]\d{9}$/.test(phone)) return showToast('Enter a valid 10-digit phone number.', 'error');
      if (!address) return showToast('Please enter your delivery address.', 'error');

      checkoutSubmitBtn.disabled = true;
      const originalText = checkoutSubmitBtn.textContent;
      checkoutSubmitBtn.textContent = 'Processing...';

      const toast = showToast('Placing your order...', 'loading');

      try {
        const userSnap = await get(ref(rtdb, `users/${user.uid}`));
        if (userSnap.exists() && userSnap.val()?.orderBlocked === true) {
          updateToast(toast, 'Orders are blocked for this account. Please contact support.', 'error');
          checkoutSubmitBtn.disabled = false;
          checkoutSubmitBtn.textContent = originalText;
          return;
        }

        const orderData = {
          userId: user.uid,
          userName: fullName,
          userEmail: user.email,
          phone: phone || 'Not provided',
          address,
          items,
          subtotal: subtotal.toFixed(2),
          gst: gst.toFixed(2),
          totalAmount: total.toFixed(2),
          paymentMethod: 'COD',
          status: 'Pending',
          timestamp: Date.now()
        };

        await push(ref(rtdb, 'standardOrders'), orderData);

        for (const item of items) {
          if (!item.isCustom) {
            const productRef = ref(rtdb, `products/${item.productId}`);
            const productSnap = await get(productRef);
            if (productSnap.exists()) {
              const product = productSnap.val();
              if (product.qtyType === 'fixed') {
                const newStock = Math.max(0, (parseInt(product.quantity, 10) || 0) - item.quantity);
                await update(productRef, { quantity: newStock });
              }
            }
          }
        }

        const userUpdate = {
          name: fullName,
          address
        };
        if (isGoogleUser) {
          userUpdate.phone = phone;
        }
        await update(ref(rtdb, `users/${user.uid}`), userUpdate);

        await remove(ref(rtdb, `carts/${user.uid}`));

        updateToast(toast, 'Order placed successfully!', 'success');
        closeCheckoutModal();
        setTimeout(() => {
          window.location.href = 'orders.html';
        }, 900);
      } catch (error) {
        console.error(error);
        updateToast(toast, 'Checkout failed: ' + error.message, 'error');
        checkoutSubmitBtn.disabled = false;
        checkoutSubmitBtn.textContent = originalText;
      }
    }

    function renderCart(user, cartData) {
      const container = document.getElementById('cart-content');
      container.innerHTML = `
        <div class="cart-header">
          <h1>My Bag <span style="font-family:Sora; font-size:20px; opacity:0.4;">(${Object.keys(cartData).length} items)</span></h1>
        </div>
        <div class="cart-grid">
          <div class="cart-items" id="items-list"></div>
          <div class="order-summary" id="order-summary"></div>
        </div>
      `;

      const list = document.getElementById('items-list');
      let subtotal = 0;

      Object.keys(cartData).forEach((cartId) => {
        const item = cartData[cartId];
        subtotal += item.price * item.quantity;

        const card = document.createElement('div');
        card.className = 'cart-item';
        card.innerHTML = `
          <img src="${item.image}" class="item-img">
          <div class="item-info">
            <h3>${item.name}</h3>
            <div class="item-details">
              <span>Size: <strong>${item.size}</strong></span>
              <span>Color: <div class="color-preview" style="background:${item.color}"></div></span>
              <span>Neck: <strong>${item.neck || 'Standard'}</strong></span>
              <span>Fastener: <strong>${item.fastener || 'Plain'}</strong></span>
            </div>
            <div class="item-qty-controls">
              <button class="qty-btn" onclick="window.updateQty('${cartId}', ${item.quantity - 1})">-</button>
              <span style="font-weight:700;">${item.quantity}</span>
              <button class="qty-btn" onclick="window.updateQty('${cartId}', ${item.quantity + 1})">+</button>
              <div style="margin-left:auto; text-align:right;">
                ${item.price > 0 ? `
                  ${item.originalPrice && item.originalPrice > item.price ? `<span style="font-size:12px; color:#ff4d4d; text-decoration:line-through; display:block; opacity:0.6;">Rs ${(item.originalPrice * item.quantity).toFixed(2)}</span>` : ''}
                  <span style="font-weight:700; font-size:18px; display:block;">Rs ${(item.price * item.quantity).toFixed(2)}</span>
                ` : `
                  <span style="font-weight:700; font-size:14px; color:#72a5b8; display:block;">Price to be quoted</span>
                `}
              </div>
            </div>
            <button class="remove-btn" onclick="window.removeItem('${cartId}')">Remove from bag</button>
          </div>
        `;
        list.appendChild(card);
      });

      const gst = subtotal * 0.05;
      const total = subtotal + gst;

      document.getElementById('order-summary').innerHTML = `
        <h3 style="font-family:'Bebas Neue'; font-size:32px; margin-top:0;">Summary</h3>
        <div class="summary-row"><span>Subtotal</span><span>Rs ${subtotal.toFixed(2)}</span></div>
        <div class="summary-row"><span>GST (5%)</span><span>Rs ${gst.toFixed(2)}</span></div>
        <div class="summary-row"><span>Delivery</span><span>FREE</span></div>
        <div class="summary-total"><div class="summary-row"><span>Total</span><span>Rs ${total.toFixed(2)}</span></div></div>
        <button class="checkout-btn" id="cart-checkout-btn" type="button">Checkout Now</button>
      `;

      window.updateQty = async (cartId, newQty) => {
        if (newQty < 1) {
          window.removeItem(cartId);
          return;
        }
        await update(ref(rtdb, `carts/${user.uid}/${cartId}`), { quantity: newQty });
      };

      window.removeItem = async (cartId) => {
        if (await showConfirm('Remove this item fully from your bag?', 'Remove Item')) {
          await remove(ref(rtdb, `carts/${user.uid}/${cartId}`));
          showToast('Item removed', 'success');
        }
      };

      const proceedToCheckout = () => prepareCheckoutModal(user, cartData);
      document.getElementById('cart-checkout-btn')?.addEventListener('click', proceedToCheckout);
      window.checkout = proceedToCheckout;
    }
  </script>
</body>
</html>
